# ============================================================
# deploy/apache-ssl.conf
# Apache 2.4 SSL/HTTPS Virtual Host configuration for PRMS v3
# Use this ONLY when you have a real domain + Let's Encrypt cert.
#
# Pre-requisites:
#   sudo a2enmod ssl rewrite headers deflate expires proxy_fcgi
#   sudo certbot --apache -d prms.yourdomain.com
#   # (or obtain cert manually and adjust cert paths below)
#
# Installation:
#   # Replace prms.yourdomain.com with your real domain in this file.
#   sudo cp deploy/apache-ssl.conf /etc/apache2/sites-available/prms.conf
#   sudo a2ensite prms
#   grep -q "^Listen 8080" /etc/apache2/ports.conf || \
#       echo "Listen 8080" | sudo tee -a /etc/apache2/ports.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# WARNING: Do NOT use this file on a LAN server without valid certs.
#   Apache will refuse to load the VirtualHost and fall back to the
#   default DocumentRoot (/var/www/html), causing 404 on all requests.
#   Use deploy/apache.conf (plain HTTP) for LAN / IP-only deployments.
# ============================================================

<VirtualHost *:80>
    ServerName  prms.yourdomain.com
    ServerAlias www.prms.yourdomain.com

    # Redirect all plain-HTTP traffic to HTTPS on port 8080
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}:8080%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:8080>
    ServerName  prms.yourdomain.com
    ServerAlias www.prms.yourdomain.com

    DocumentRoot /var/www/prms/public

    # -- PHP-FPM via socket -----------------------------------------
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    <Directory /var/www/prms/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # -- SSL --------------------------------------------------------
    SSLEngine             on
    SSLCertificateFile    /etc/letsencrypt/live/prms.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/prms.yourdomain.com/privkey.pem

    # -- Security headers -------------------------------------------
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-XSS-Protection          "1; mode=block"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    # Note: preload removed -- HSTS preload list requires standard port 443
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    # -- Upload limits ----------------------------------------------
    LimitRequestBody 52428800

    # -- Logs -------------------------------------------------------
    ErrorLog  ${APACHE_LOG_DIR}/prms_error.log
    CustomLog ${APACHE_LOG_DIR}/prms_access.log combined
</VirtualHost>
