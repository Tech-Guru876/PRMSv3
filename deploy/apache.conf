# ============================================================
# deploy/apache.conf
# Apache 2.4 Virtual Host configuration for PRMS v3
# HTTPS served on port 8080 (custom port)
#
# Installation:
#   sudo cp deploy/apache.conf /etc/apache2/sites-available/prms.conf
#   sudo a2ensite prms
#   sudo a2enmod rewrite headers deflate expires ssl
#   # Ensure Apache listens on port 8080:
#   echo "Listen 8080" | sudo tee -a /etc/apache2/ports.conf
#   sudo systemctl reload apache2
# ============================================================

<VirtualHost *:80>
    ServerName  prms.example.com
    ServerAlias www.prms.example.com

    # Redirect all plain-HTTP traffic to HTTPS on port 8080
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}:8080%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:8080>
    ServerName  prms.example.com
    ServerAlias www.prms.example.com

    DocumentRoot /var/www/prms/public

    # ── PHP-FPM via socket ──────────────────────────────────
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    <Directory /var/www/prms/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── SSL ─────────────────────────────────────────────────
    SSLEngine             on
    SSLCertificateFile    /etc/letsencrypt/live/prms.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/prms.example.com/privkey.pem

    # ── Security headers ────────────────────────────────────
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-XSS-Protection          "1; mode=block"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    # Note: preload removed — HSTS preload list requires standard port 443
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    # ── Upload limits ───────────────────────────────────────
    LimitRequestBody 52428800  # 50 MB

    # ── Logs ────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/prms_error.log
    CustomLog ${APACHE_LOG_DIR}/prms_access.log combined
</VirtualHost>
