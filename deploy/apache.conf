# ============================================================
# deploy/apache.conf
# Apache 2.4 Virtual Host configuration for PRMS v3
# Plain HTTP on port 8080 -- suitable for LAN / IP-address access.
#
# Installation:
#   sudo cp deploy/apache.conf /etc/apache2/sites-available/prms.conf
#   sudo a2ensite prms
#   sudo a2enmod rewrite headers deflate expires proxy_fcgi
#   # Ensure Apache listens on port 8080:
#   grep -q "^Listen 8080" /etc/apache2/ports.conf || \
#       echo "Listen 8080" | sudo tee -a /etc/apache2/ports.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# SSL / HTTPS upgrade (public domain only):
#   When you have a real domain name and a Let's Encrypt certificate,
#   enable SSL by:
#     1. sudo a2enmod ssl
#     2. Replace <VirtualHost *:8080> below with the two-VirtualHost
#        block in deploy/apache-ssl.conf (provided separately), then
#        substitute your real domain and cert paths.
#   Do NOT add SSLEngine on without valid certificates -- Apache will
#   refuse to load the VirtualHost and silently fall back to the
#   default DocumentRoot (/var/www/html), causing 404 on all requests.
# ============================================================

<VirtualHost *:8080>
    # Replace 192.168.1.100 with your actual server IP or hostname.
    ServerName  192.168.1.100

    DocumentRoot /var/www/prms/public

    # -- PHP-FPM via socket -----------------------------------------
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    <Directory /var/www/prms/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # -- Security headers -------------------------------------------
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-XSS-Protection          "1; mode=block"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"

    # -- Upload limits ----------------------------------------------
    LimitRequestBody 52428800

    # -- Logs -------------------------------------------------------
    ErrorLog  ${APACHE_LOG_DIR}/prms_error.log
    CustomLog ${APACHE_LOG_DIR}/prms_access.log combined
</VirtualHost>
