# ============================================================
# deploy/nginx.conf
# Nginx virtual host configuration for PRMS v3
# HTTPS served on port 8080 (custom port)
#
# Installation:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/prms
#   sudo ln -s /etc/nginx/sites-available/prms /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirect HTTP → HTTPS on port 8080
server {
    listen      80;
    listen      [::]:80;
    server_name prms.example.com www.prms.example.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host:8080$request_uri; }
}

server {
    listen      8080 ssl;
    listen      [::]:8080 ssl;
    http2       on;
    server_name prms.example.com www.prms.example.com;

    root  /var/www/prms/public;
    index index.php index.html;

    # ── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/prms.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prms.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    # Note: preload removed — HSTS preload list requires standard port 443
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Upload limit ────────────────────────────────────────
    client_max_body_size 50M;

    # ── URL routing ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── PHP-FPM ─────────────────────────────────────────────
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Increase timeouts for long-running scripts (PDF generation, exports)
        fastcgi_read_timeout  120;
    }

    # ── Block access to sensitive files ─────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
    }

    location ~* ^/(config|migrations|deploy|vendor)/.*\.(php|sql|sh|env)$ {
        deny all;
    }

    # ── Static asset caching ────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logs ────────────────────────────────────────────────
    access_log /var/log/nginx/prms_access.log;
    error_log  /var/log/nginx/prms_error.log;
}
